<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Dorm Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=Nunito:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #eef2f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    padding: 24px;
  }

  h1 {
    font-size: 1.5rem;
    color: #2c4a6e;
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  .status {
    background: white;
    border: 2px solid #b8cfe8;
    border-radius: 10px;
    padding: 8px 24px;
    margin-bottom: 16px;
    font-size: 0.95rem;
    color: #555;
  }

  .status code {
    font-family: 'DM Mono', monospace;
    color: #c0593a;
    font-size: 1.05rem;
  }

  .map-wrap {
    position: relative;
    display: inline-block;
    max-width: 700px;
    width: 100%;
  }

  .map-wrap img {
    width: 100%;
    display: block;
    border-radius: 16px;
    pointer-events: none;
    user-select: none;
  }

  .dorm-zone {
    position: absolute;
    cursor: pointer;
    border-radius: 10px;
    border: 2px solid transparent;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }

  .dorm-zone:hover {
    background: rgba(100, 160, 210, 0.3);
    border-color: rgba(74, 112, 150, 0.6);
    box-shadow: 0 0 12px rgba(74, 112, 150, 0.35);
  }

  .dorm-zone.active {
    background: rgba(192, 89, 58, 0.25);
    border-color: rgba(192, 89, 58, 0.8);
    box-shadow: 0 0 16px rgba(192, 89, 58, 0.4);
  }

  .nav-btn {
    background: white;
    border: 2px solid #b8cfe8;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.2rem;
    color: #2c4a6e;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }

  .nav-btn:hover {
    background: #2c4a6e;
    color: white;
    border-color: #2c4a6e;
  }

  /* Popup styles */
  .dorm-popup {
    position: absolute;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1.5px solid rgba(184, 207, 232, 0.65);
    border-radius: 12px;
    padding: 10px 14px;
    box-shadow: 0 6px 20px rgba(44, 74, 110, 0.12);
    z-index: 100;
    min-width: 150px;
    pointer-events: none;
    transform: translate(-50%, calc(-100% - 14px));
    transition: opacity 0.15s;
  }

  .dorm-popup::after {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -9px;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-top: 9px solid #b8cfe8;
  }

  .dorm-popup::before {
    content: '';
    position: absolute;
    left: 50%;
    bottom: -7px;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid white;
    z-index: 1;
  }

  .dorm-popup .popup-name {
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #2c4a6e;
    margin-bottom: 8px;
    border-bottom: 1px solid #e4edf7;
    padding-bottom: 6px;
  }

  .dorm-popup .popup-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: #555;
    margin-top: 5px;
  }

  .dorm-popup .popup-icon {
    font-size: 0.9rem;
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }

  .dorm-popup .popup-val {
    font-family: 'DM Mono', monospace;
    color: #c0593a;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .dorm-popup .popup-beds-note {
    font-size: 0.73rem;
    color: #888;
    margin-top: 2px;
    padding-left: 26px;
    font-style: italic;
  }
</style>
</head>
<body>

<h1>Select your dorm!</h1>
<div class="status">Dorm Chosen: <code id="display"></code></div>

<div style="display: flex; align-items: center; gap: 16px;">
  <button class="nav-btn" onclick="location.href='first_page.html'">&#8592;</button>
  <div class="map-wrap" id="map">
    <img src="Map2.png" alt="Campus Map">
    <div class="dorm-popup" id="popup" style="display:none;"></div>
  </div>
  <button class="nav-btn" onclick="goNext()">&#8594;</button>
</div>

<script>
  let dorm_var = null;

  function goNext() {
    if (dorm_var) {
      location.href = `duke_dashboard_new_design.html?dorm=${dorm_var}`;
    } else {
      location.href = 'duke_dashboard_new_design.html';
    }
  }

  const dorms = [
    { label: "Bell Tower",     value: "bell_tower",     l: 17,   t: 8,  w: 20, h: 26, year: 2005, beds: 154 },
    { label: "Randolph",       value: "randolph",       l: 36,   t: 14, w: 17, h: 20, year: 1994, beds: 190 },
    { label: "Trinity",        value: "trinity",        l: 3,    t: 28, w: 16, h: 20, year: 2018, beds: 264 },

    { label: "Southgate",      value: "southgate",      l: 11,   t: 47, w: 22, h: 24, year: 1923, beds: 136 },
    { label: "Blackwell",      value: "blackwell",      l: 40,   t: 35, w: 20, h: 22, year: 1994, beds: 192 },
    { label: "Gilbert-Addoms", value: "gilbert_addoms", l: 30,   t: 60, w: 24, h: 24, year: 1957, beds: 195 },
    { label: "Pegram",         value: "pegram",         l: 60,   t: 10, w: 15, h: 20, year: 1927, beds: 133 },
    { label: "Alspaugh",       value: "alspaugh",       l: 59,   t: 30, w: 17, h: 20, year: 1927, beds: 134 },
    { label: "Giles",          value: "giles",          l: 61,   t: 48, w: 18, h: 18, year: 1927, beds: 116 },
    { label: "West House",     value: "west_house",     l: 63.5, t: 67, w: 18, h: 22, year: 1912, beds: 94 },
    { label: "Bassett",        value: "bassett",        l: 76,   t: 12, w: 24, h: 18, year: 1927, beds: 121 },
    { label: "Brown",          value: "brown",          l: 76,   t: 30, w: 22, h: 20, year: 1927, beds: 123 },
    { label: "Wilson",         value: "wilson",         l: 77,   t: 48, w: 22, h: 18, year: 1930, beds: 94 },
  ];

  const map = document.getElementById('map');
  const display = document.getElementById('display');
  const popup = document.getElementById('popup');

  function showPopup(d, zone) {
    const mapRect = map.getBoundingClientRect();
    const zoneRect = zone.getBoundingClientRect();

    const zoneLeft = zoneRect.left - mapRect.left;
    const zoneCenterX = zoneLeft + zoneRect.width / 2;
    const zoneTop = zoneRect.top - mapRect.top;

    popup.style.left = zoneCenterX + 'px';
    popup.style.top = zoneTop + 'px';

    let bedsHTML = `<div class="popup-row">
      <span class="popup-icon">🛏</span>
      <span>Beds: <span class="popup-val">${d.beds}</span></span>
    </div>`;
    if (d.bedsNote) {
      bedsHTML += `<div class="popup-beds-note">${d.bedsNote}</div>`;
    }

    popup.innerHTML = `
      <div class="popup-row">
        <span class="popup-icon">🏛</span>
        <span>Built: <span class="popup-val">${d.year}</span></span>
      </div>
      ${bedsHTML}
    `;
    popup.style.display = 'block';
  }

  function hidePopup() {
    popup.style.display = 'none';
  }

  function setActive(index) {
    document.querySelectorAll('.dorm-zone').forEach(z => z.classList.remove('active'));
    const d = dorms[index];
    dorm_var = d.value;
    display.textContent = d.label;
    const zone = document.querySelectorAll('.dorm-zone')[index];
    zone.classList.add('active');
    showPopup(d, zone);
  }

  dorms.forEach((d, i) => {
    const zone = document.createElement('div');
    zone.className = 'dorm-zone';
    zone.style.left   = d.l + '%';
    zone.style.top    = d.t + '%';
    zone.style.width  = d.w + '%';
    zone.style.height = d.h + '%';

    zone.addEventListener('click', () => {
      if (dorm_var === d.value) {
        dorm_var = null;
        display.textContent = 'null';
        zone.classList.remove('active');
        hidePopup();
        return;
      }
      setActive(i);
    });

    map.appendChild(zone);
  });

  document.addEventListener('click', (e) => {
    if (!e.target.classList.contains('dorm-zone')) {
      hidePopup();
      document.querySelectorAll('.dorm-zone').forEach(z => z.classList.remove('active'));
      dorm_var = null;
      display.textContent = '';
    }
  });
</script>

</body>
</html>
